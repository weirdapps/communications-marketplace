# Executive Summary Presentation
# A concise board-level presentation following McKinsey Pyramid Principle

template: GR

presentation:
  title: "Q4 2025 Digital Banking Performance"
  audience: "Board of Directors"
  purpose: "Quarterly results review and strategic recommendations"
  main_recommendation: "Digital adoption exceeded targets; recommend accelerating mobile-first investments"

slides:
  - type: cover
    content:
      title: "Digital Banking Performance"
      subtitle: "Q4 2025 Executive Summary"
      location: "Athens, Greece"
      date: "February 2026"

  - type: divider
    content:
      number: "01"
      title: "Executive Summary"

  - type: content
    content:
      title: "Digital channels exceeded all KPIs, driven by mobile app adoption increase of 23%"
      bumper: "KEY FINDING"
      points:
        - "Mobile active users reached 2.8M, up 23% YoY"
        - "Digital transaction share grew to 78% of total volume"
        - "Customer satisfaction (NPS) improved by 12 points to +45"
        - "Cost-to-serve reduced by 15% through digital migration"

  - type: chart
    recommended_visual: bar_chart
    content:
      title: "Mobile adoption growth outpaced all competitors in 2025"
      description: "Monthly Active Users (MAU) comparison across systemic banks"
    chart:
      type: bar
      data:
        categories: ["NBG", "Eurobank", "Alpha", "Piraeus"]
        series:
          - name: "Q4 2024"
            values: [2.28, 2.1, 1.9, 1.7]
          - name: "Q4 2025"
            values: [2.8, 2.4, 2.2, 1.95]

  - type: content
    content:
      title: "Three strategic initiatives drove the exceptional performance"
      bumper: "SUCCESS FACTORS"
      points:
        - "New mobile app UX launched in Q2 increased session duration by 40%"
        - "IRIS instant payments integration captured 35% of P2P transfer market"
        - "AI-powered personalization improved conversion rates by 25%"

  - type: divider
    content:
      number: "02"
      title: "Recommendations"

  - type: content
    content:
      title: "Recommend accelerating mobile-first investment to capture market opportunity"
      bumper: "RECOMMENDATION"
      points:
        - "Increase mobile development budget by 20% in 2026"
        - "Expand AI personalization to lending products"
        - "Launch business mobile banking app in Q2 2026"
        - "Target: 3.5M MAU by end of 2026"

  - type: back_cover
