# Quarterly Financial Report Presentation
# Detailed performance metrics with charts and tables

template: GR

presentation:
  title: "Cards & Digital Business Quarterly Report"
  audience: "Executive Committee"
  purpose: "Q4 2025 performance review with detailed metrics"
  main_recommendation: "Strong performance across all segments; digital migration on track"

slides:
  - type: cover
    content:
      title: "Cards & Digital Business"
      subtitle: "Quarterly Performance Report Q4 2025"
      location: "Athens, Greece"
      date: "January 2026"

  - type: divider
    content:
      number: "01"
      title: "Cards Business Performance"

  - type: content
    content:
      title: "Card transaction volume grew 18% YoY reaching EUR 12.5B in Q4"
      bumper: "CARDS OVERVIEW"
      points:
        - "Total cards: 5.2M (+3% YoY)"
        - "Active cards: 3.8M (73% activation rate)"
        - "POS transactions: EUR 8.2B (+22% YoY)"
        - "E-commerce transactions: EUR 4.3B (+35% YoY)"

  - type: chart
    recommended_visual: line_chart
    content:
      title: "Monthly transaction volume shows consistent growth trajectory"
      description: "Card transaction volume in EUR billions"
    chart:
      type: line
      data:
        categories: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"]
        series:
          - name: "2024"
            values: [3.2, 3.1, 3.3, 3.5, 3.6, 3.8, 3.7, 3.9, 4.0, 4.2, 4.4, 4.8]
          - name: "2025"
            values: [3.8, 3.7, 4.0, 4.2, 4.3, 4.5, 4.4, 4.6, 4.8, 5.0, 5.3, 5.8]

  - type: table
    content:
      title: "Card P&L summary shows 15% net fee income growth"
    table:
      headers: ["Metric", "Q4 2024", "Q4 2025", "Change"]
      rows:
        - ["Interchange Revenue", "EUR 42M", "EUR 48M", "+14%"]
        - ["Annual Fees", "EUR 18M", "EUR 21M", "+17%"]
        - ["Foreign Exchange", "EUR 8M", "EUR 11M", "+38%"]
        - ["Total Net Fee Income", "EUR 68M", "EUR 80M", "+18%"]
      highlight_column: 3

  - type: divider
    content:
      number: "02"
      title: "Digital Banking Performance"

  - type: chart
    recommended_visual: bar_chart
    content:
      title: "Digital channel adoption accelerated across all customer segments"
      description: "Digital transaction share by segment"
    chart:
      type: bar
      data:
        categories: ["Retail", "Affluent", "Business", "Corporate"]
        series:
          - name: "Q4 2024"
            values: [68, 72, 45, 38]
          - name: "Q4 2025"
            values: [78, 85, 58, 52]

  - type: content
    content:
      title: "Mobile app metrics demonstrate strong engagement and growth"
      bumper: "MOBILE BANKING"
      points:
        - "Downloads: 850K in Q4 (+45% vs Q4 2024)"
        - "Monthly Active Users: 2.8M (+23% YoY)"
        - "Average sessions per user: 18/month (+30% YoY)"
        - "In-app transactions: 45M (+40% YoY)"

  - type: divider
    content:
      number: "03"
      title: "Outlook & Priorities"

  - type: content
    content:
      title: "2026 priorities focus on mobile expansion and AI-driven personalization"
      bumper: "STRATEGIC PRIORITIES"
      points:
        - "Launch enhanced business mobile banking app (Q2)"
        - "Deploy AI recommendation engine for card products"
        - "Expand contactless issuance to 100% of new cards"
        - "Achieve 85% digital transaction share by year-end"

  - type: back_cover
