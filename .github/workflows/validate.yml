name: Validate Plugins

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate marketplace.json
        run: |
          if [ ! -f ".claude-plugin/marketplace.json" ]; then
            echo "Error: marketplace.json not found"
            exit 1
          fi
          echo "✓ marketplace.json found"
          cat .claude-plugin/marketplace.json | python3 -m json.tool
          echo "✓ marketplace.json is valid JSON"

      - name: Validate plugin manifests
        run: |
          for dir in plugins/*/; do
            if [ -d "$dir" ] && [ "$(basename "$dir")" != "_template" ]; then
              # Check both locations for plugin.json
              if [ -f "${dir}plugin.json" ]; then
                plugin_json="${dir}plugin.json"
              elif [ -f "${dir}.claude-plugin/plugin.json" ]; then
                plugin_json="${dir}.claude-plugin/plugin.json"
              else
                echo "✗ Error: Missing plugin.json in $dir"
                exit 1
              fi
              echo "✓ Validating $plugin_json"
              cat "$plugin_json" | python3 -m json.tool > /dev/null
            fi
          done
          echo "✓ All plugin manifests valid"

      - name: Validate README files exist
        run: |
          errors=0

          # Check marketplace README
          if [ ! -f "README.md" ]; then
            echo "✗ Missing: README.md"
            errors=$((errors + 1))
          else
            echo "✓ README.md exists"
          fi

          # Check plugin READMEs
          for dir in plugins/*/; do
            if [ -d "$dir" ] && [ "$(basename "$dir")" != "_template" ]; then
              if [ ! -f "${dir}README.md" ]; then
                echo "✗ Missing: ${dir}README.md"
                errors=$((errors + 1))
              else
                echo "✓ ${dir}README.md exists"
              fi
            fi
          done

          if [ $errors -gt 0 ]; then
            exit 1
          fi

      - name: Validate agent SKILL.md files
        run: |
          errors=0

          for plugin_dir in plugins/*/; do
            if [ -d "$plugin_dir" ] && [ "$(basename "$plugin_dir")" != "_template" ]; then
              # Check agents directory
              if [ -d "${plugin_dir}agents" ]; then
                for agent_dir in ${plugin_dir}agents/*/; do
                  if [ -d "$agent_dir" ]; then
                    if [ ! -f "${agent_dir}SKILL.md" ]; then
                      echo "✗ Missing: ${agent_dir}SKILL.md"
                      errors=$((errors + 1))
                    else
                      echo "✓ ${agent_dir}SKILL.md exists"
                    fi
                  fi
                done
              fi

              # Check orchestrator directory
              if [ -d "${plugin_dir}orchestrator" ]; then
                for orch_dir in ${plugin_dir}orchestrator/*/; do
                  if [ -d "$orch_dir" ]; then
                    if [ ! -f "${orch_dir}SKILL.md" ]; then
                      echo "✗ Missing: ${orch_dir}SKILL.md"
                      errors=$((errors + 1))
                    else
                      echo "✓ ${orch_dir}SKILL.md exists"
                    fi
                  fi
                done
              fi
            fi
          done

          if [ $errors -gt 0 ]; then
            exit 1
          fi
          echo "✓ All agent SKILL.md files present"

      - name: Validate command files
        run: |
          errors=0

          for plugin_dir in plugins/*/; do
            if [ -d "$plugin_dir" ] && [ "$(basename "$plugin_dir")" != "_template" ]; then
              if [ -d "${plugin_dir}commands" ]; then
                cmd_count=$(find "${plugin_dir}commands" -name "*.md" | wc -l)
                if [ "$cmd_count" -eq 0 ]; then
                  echo "⚠ Warning: No command files in ${plugin_dir}commands"
                else
                  echo "✓ Found $cmd_count command(s) in ${plugin_dir}commands"
                fi
              fi
            fi
          done

      - name: Validate brand system (NBG plugin)
        run: |
          brand_system="plugins/presentation-maker/shared/nbg-brand-system"

          if [ -d "$brand_system" ]; then
            required_files=("README.md" "colors.md" "typography.md" "layouts.md" "dimensions.md" "charts.md" "icons.md")

            for file in "${required_files[@]}"; do
              if [ ! -f "$brand_system/$file" ]; then
                echo "✗ Missing brand system file: $file"
                exit 1
              else
                echo "✓ $brand_system/$file exists"
              fi
            done
            echo "✓ Brand system complete"
          fi

      - name: Validate plugin.json against schema
        run: |
          if [ -f "schemas/plugin.schema.json" ]; then
            echo "Schema found, validating plugin manifests..."
            # Basic JSON structure validation (full schema validation requires additional tooling)
            for dir in plugins/*/; do
              if [ -d "$dir" ] && [ "$(basename "$dir")" != "_template" ]; then
                plugin_json="${dir}plugin.json"
                if [ -f "$plugin_json" ]; then
                  # Check required fields exist
                  for field in name description version type; do
                    if ! python3 -c "import json; d=json.load(open('$plugin_json')); assert '$field' in d" 2>/dev/null; then
                      echo "✗ Missing required field '$field' in $plugin_json"
                      exit 1
                    fi
                  done
                  echo "✓ $plugin_json has all required fields"
                fi
              fi
            done
          else
            echo "⚠ Schema not found, skipping schema validation"
          fi

      - name: Validate command frontmatter
        run: |
          errors=0
          for cmd_file in plugins/*/commands/*.md; do
            if [ -f "$cmd_file" ]; then
              if head -1 "$cmd_file" | grep -q "^---$"; then
                echo "✓ $cmd_file has frontmatter"
              else
                echo "✗ $cmd_file missing frontmatter"
                errors=$((errors + 1))
              fi
            fi
          done
          if [ $errors -gt 0 ]; then
            exit 1
          fi
          echo "✓ All command files have frontmatter"

      - name: Validate example YAML files
        run: |
          for yaml_file in plugins/*/examples/*.yaml plugins/*/examples/*.yml; do
            if [ -f "$yaml_file" ]; then
              python3 -c "import yaml; yaml.safe_load(open('$yaml_file'))" 2>/dev/null
              if [ $? -eq 0 ]; then
                echo "✓ $yaml_file parses correctly"
              else
                echo "✗ $yaml_file failed to parse"
                exit 1
              fi
            fi
          done

      - name: Summary
        run: |
          echo ""
          echo "════════════════════════════════════════════"
          echo "  Validation Complete"
          echo "════════════════════════════════════════════"
          echo ""
          echo "All checks passed!"
